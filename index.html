        <section class="services-block">
          <div class="section-title-row">
            <div>
              <p class="eyebrow">Passport Services</p>
              <h3>Know About Our Services</h3>
            </div>
          </div>
          <div class="services-grid">
            <div class="service-card"><strong>Fresh / Re-issue Ordinary Passport</strong><span>Apply for a new passport or request renewal.</span></div>
            <div class="service-card"><strong>Tatkaal Passport</strong><span>Check eligibility for the Tatkaal scheme and faster issue.</span></div>
            <div class="service-card"><strong>Diplomatic / Official Passport</strong><span>Official travel document support for eligible applicants.</span></div>
            <div class="service-card"><strong>Police Clearance Certificate</strong><span>Request PCC for employment, travel and migration purposes.</span></div>
            <div class="service-card"><strong>Identity Certificate / Surrender Certificate</strong><span>Handle surrender, IC and related special documents.</span></div>
            <div class="service-card"><strong>Line of Control Permit</strong><span>Guidance for LoC permit applications and process details.</span></div>
            <div class="service-card"><strong>Passport Act and Rules</strong><span>Browse the legal framework and applicant responsibilities.</span></div>
            <div class="service-card"><strong>Annexures and Affidavits</strong><span>Access supporting declaration formats and instructions.</span></div>
            <div class="service-card"><strong>Apply for Passport Abroad</strong><span>Indian Missions and Posts abroad application guidance.</span></div>
            <div class="service-card"><strong>Global Entry Program Verification</strong><span>Verification support for eligible international travelers.</span></div>

        </section>

        <section class="stats-wrap card">
          <div class="section-title-row">
            <div>

            <div class="stat-box"><strong>318956+</strong><span>Applications Processed</span></div>
            <div class="stat-box"><strong>275164+</strong><span>Passports Issued</span></div>
          </div>

        <section class="grid-two portal-grid">
          <article class="card">
            <p class="eyebrow">Public Notice</p>
            <h3>Important schemes and advisories</h3>
            <div class="feature-stack">
              <div class="feature-row"><strong>Tatkaal Passport</strong><span>For obtaining Passport under Tatkaal scheme, applicants have to submit additional documents. Check eligibility and supporting documents.</span><a class="inline-link" href="/form">Know More</a></div>
              <div class="feature-row"><strong>Normal / Tatkaal Appointment Opening Time</strong><span>Appointments opening time corresponding to each Passport Office for applicants.</span><a class="inline-link" href="/appointment">Know More</a></div>
              <div class="feature-row"><strong>Advisory for Indians going on Work Abroad</strong><span>Advisory for Indian citizens going for jobs in a foreign country. Go Safe Go Trained.</span><a class="inline-link" href="/design-decisions">Know More</a></div>
            </div>
          </article>
          <article class="card">
            <p class="eyebrow">Latest News</p>
            <h3>Circulars and current highlights</h3>
            <div class="news-list">
              <div class="news-item"><strong>Circular</strong><span>Passport portal services are available across 500+ locations nationwide.</span></div>
              <div class="news-item"><strong>Latest News</strong><span>mPassport Seva App and helpdesk support remain available for applicant assistance.</span></div>
              <div class="news-item"><strong>Applicant Update</strong><span>Demo login remains active for assignment evaluation and walkthrough review.</span></div>
            </div>
          </article>
        </section>

        <section class="grid-two portal-grid">
          <article class="card">
            <p class="eyebrow">Help and Support</p>
            <h3>We are available 24/7 to help you with your Passport journey</h3>

              <div class="faq-item"><strong>Write to our Helpdesk</strong><p>Get support for login, documents, appointments and application tracking.</p></div>

              <div class="faq-item"><strong>Demo Login</strong><p>Use `hire-me@anshumat.org` / `HireMe@2025!` to access the portal flow.</p></div>
            </div>
          </article>
          <article class="card">
            <p class="eyebrow">Find a Passport Seva Location</p>
            <h3>500+ service locations available</h3>
            <div class="locator-box">
              <input id="location-search-input" type="text" placeholder="Enter your PIN code" inputmode="numeric" />
              <button id="location-search-btn" class="primary-btn" type="button">Search Location</button>
            </div>
            <div id="location-results" class="location-results top-space"></div>
            <div class="app-download-grid top-space">
              <div class="app-card"><strong>mPassport Seva App</strong><span>Access guidance, status and center information on mobile.</span></div>
              <div class="app-card"><strong>mPassport Police App</strong><span>Support police verification workflows and document review.</span></div>
            </div>
          </article>
        </section>

        <section class="grid-two portal-grid">
          <article class="card">
            <p class="eyebrow">External Links</p>

        <footer class="site-footer portal-footer">

    <template id="login-template">
      <section class="single">
        <article class="card auth-card">
          <p class="eyebrow">Passport Seva Demo Login</p>
          <h3>Use the seeded demo account</h3>
          <p class="muted">
            Sign in with the demo credentials below to review the portal, dashboard, receipt and full application flow.
          </p>
          <form id="login-form" class="stack">
            <label>Email<input type="email" name="email" value="hire-me@anshumat.org" required /></label>
            <label>Password<input type="password" name="password" value="HireMe@2025!" required /></label>
            <div class="demo-credentials">
              <span>Demo Login</span>
              <strong>hire-me@anshumat.org</strong>
              <strong>HireMe@2025!</strong>
            </div>
            <button class="primary-btn" type="submit">Continue to onboarding</button>
            <p id="login-error" class="error-text"></p>
          </form>
        </article>
      </section>
    </template>

    <template id="onboarding-template">
      <section class="grid-two">
        <article class="card">
          <p class="eyebrow">Welcome to Passport Services</p>
          <h3>See the whole journey before you begin</h3>
          <div class="wire-grid">
            <span>1. Basic profile</span><span>2. Form sections</span><span>3. Review</span><span>4. Documents</span><span>5. Appointment</span><span>6. Receipt</span>
          </div>
          <div class="card inset">
            <h4>Keep these ready</h4>
            <ul class="plain-list">
              <li>Identity proof</li>
              <li>Address proof</li>
              <li>Date of birth proof</li>
              <li>Recent photo</li>
            </ul>
          </div>
        </article>
        <article class="card">
          <form id="onboarding-form" class="stack">
            <label>Full Name<input type="text" name="name" autocomplete="name" required /></label>
            <label>Date of Birth<input type="date" name="dob" required /></label>
            <label>City<input type="text" name="city" autocomplete="address-level2" required /></label>
            <button class="primary-btn" type="submit">Start passport application</button>
          </form>
        </article>
      </section>
    </template>

    <template id="dashboard-template">
      <section class="grid-two">
        <article class="card">
          <p class="eyebrow">Dashboard</p>
          <h3 id="dashboard-title">Your application at a glance</h3>
          <div class="tile-grid">
            <div class="tile"><span>Current status</span><strong id="status-text"></strong></div>
            <div class="tile"><span>Application ID</span><strong id="application-id"></strong></div>
            <div class="tile"><span>Last saved</span><strong id="last-saved"></strong></div>
          </div>
          <div class="progress-wrap">
            <div class="progress-meta"><span>Progress saved</span><span id="progress-label"></span></div>
            <div class="progress-track"><div id="progress-bar" class="progress-bar"></div></div>
          </div>
          <div class="actions">
            <button class="primary-btn" data-screen="form">Continue application</button>
            <button class="secondary-btn" data-screen="receipt">View receipt</button>
          </div>
        </article>

        <article class="card">
          <p class="eyebrow">Status Tracking</p>
          <h3>Recent activity</h3>
          <ul id="activity-list" class="plain-list"></ul>
          <div id="timeline-list" class="timeline-list top-space"></div>
        </article>
      </section>

      <section class="grid-two">
        <article class="card">
          <p class="eyebrow">Record Access</p>
          <h3>Cloud export and follow-up</h3>
          <div id="export-actions" class="tile-grid"></div>
        </article>
        <article class="card">
          <p class="eyebrow">Next Action</p>
          <h3>What should the applicant do next?</h3>
          <p id="next-action-copy" class="lede"></p>
        </article>
      </section>

      <section class="grid-two">
        <article class="card">
          <p class="eyebrow">Support</p>
          <h3>Help that appears before users get stuck</h3>
          <div class="feature-stack">
            <div class="feature-row"><strong>Document rules</strong><span>Accepted file types and proof purpose are shown inline</span></div>
            <div class="feature-row"><strong>Save confidence</strong><span>Progress, last saved time, and timeline status remain visible</span></div>
            <div class="feature-row"><strong>Visit readiness</strong><span>Receipt and originals checklist stay accessible from the dashboard</span></div>
          </div>
        </article>
        <article class="image-card">
          <img src="./assets/hero-passport.svg" alt="Passport dashboard and progress illustration" />
        </article>
      </section>

      <section class="card">
        <p class="eyebrow">Post-Submission Tracking</p>
        <h3 id="tracking-title">Application status tracker</h3>
        <div id="tracking-list" class="tracking-grid top-space"></div>
      </section>
    </template>

    <template id="form-template">
      <section class="hero">
        <aside class="card sticky-panel">
          <p class="eyebrow">Application Form</p>
          <h3>Guided multi-step completion</h3>
          <div id="step-list" class="stack step-list"></div>
          <div id="save-pill" class="save-pill">Saved</div>
          <p class="muted">Autosave runs while the applicant is typing.</p>
        </aside>

        <article class="card">
          <div class="section-head">
            <p class="eyebrow">Step-by-step form</p>
            <h3 id="form-step-title"></h3>
            <p id="form-step-copy" class="lede"></p>
          </div>
          <div id="form-stage-root"></div>
          <div class="actions top-space">
            <button id="back-step-btn" class="secondary-btn" type="button">Back</button>
            <button id="save-next-btn" class="primary-btn" type="button">Save and continue</button>
          </div>
          <p id="form-feedback" class="success-text" aria-live="polite"></p>
        </article>
      </section>
    </template>

    <template id="documents-template">
      <section class="grid-two">
        <article class="card">
          <p class="eyebrow">Document Upload</p>
          <h3>Checklist-first upload flow</h3>
          <div id="document-list" class="stack"></div>
          <div class="actions top-space">
            <button id="docs-to-appointment-btn" class="primary-btn" type="button">Continue to appointment</button>
          </div>
          <p id="document-feedback" class="success-text" aria-live="polite"></p>
        </article>
        <article class="card">
          <p class="eyebrow">Clarity Improvements</p>
          <div class="image-card embedded-image">
            <img src="./assets/document-checklist.svg" alt="Document checklist illustration" />
          </div>
          <div class="stack">
            <div class="card inset"><strong>Purpose-led guidance</strong><p>Each proof explains why it matters and how to prepare it.</p></div>
            <div class="card inset"><strong>Immediate status feedback</strong><p>Uploads update the dashboard, save state, and timeline right away.</p></div>
            <div class="card inset"><strong>Lower confusion</strong><p>The user can see what is pending without scanning policy-heavy text.</p></div>
          </div>
        </article>
      </section>
    </template>

    <template id="appointment-template">
      <section class="grid-two">
        <article class="card">
          <p class="eyebrow">Appointment Booking</p>
          <h3>Choose a slot with context</h3>
          <form id="appointment-form" class="stack">
            <label>Passport Office<select name="passportOffice" required><option value="">Choose an office</option><option>Chennai Regional Passport Office</option><option>Bengaluru Passport Seva Kendra</option><option>Hyderabad Passport Seva Kendra</option></select></label>
            <label>Appointment Date<input type="date" name="date" required /></label>
            <label>Time Slot<select name="time" required><option value="">Choose a time slot</option><option>09:30 AM - 09:45 AM</option><option>10:30 AM - 10:45 AM</option><option>11:45 AM - 12:00 PM</option></select></label>
            <button class="primary-btn" type="submit">Book appointment</button>
            <p id="appointment-feedback" class="success-text" aria-live="polite"></p>
          </form>
        </article>
        <article class="card">
          <div class="image-card embedded-image">
            <img src="./assets/appointment-desk.svg" alt="Appointment booking desk illustration" />
          </div>
          <div class="card inset">
            <h4>Before you visit</h4>
            <ul class="plain-list">
              <li>Bring originals of all uploaded proofs</li>
              <li>Arrive 15 minutes early</li>
              <li>Keep your application ID and receipt handy</li>
            </ul>
          </div>
          <div class="card inset">
            <h4>Real-world improvements</h4>
            <ul class="plain-list">
              <li>Users book only after form review and document readiness</li>
              <li>Guidance is shown next to booking controls, not hidden elsewhere</li>
              <li>Confirmation and receipt access follow immediately after booking</li>
            </ul>
          </div>
        </article>
      </section>
    </template>

    <template id="confirmation-template">
      <section class="single">
        <article class="card confirm">
          <p class="eyebrow">Application Submitted</p>
          <h3>Your application is ready for in-person verification.</h3>
          <p id="confirmation-copy" class="lede"></p>
          <div class="tile-grid">
            <div class="tile"><span>Application ID</span><strong id="confirmation-id"></strong></div>
            <div class="tile"><span>Appointment</span><strong id="confirmation-slot"></strong></div>
            <div class="tile"><span>Receipt</span><strong id="confirmation-fee"></strong></div>
          </div>
          <div class="actions">
            <button class="primary-btn" data-screen="receipt">Open receipt</button>
            <button class="secondary-btn" data-screen="dashboard">Back to dashboard</button>
          </div>
        </article>
      </section>
    </template>

    <template id="receipt-template">
      <section class="single">
        <article class="card receipt-card">
          <div class="receipt-head">
            <div>
              <p class="eyebrow">Appointment Receipt</p>
              <h3>Passport application acknowledgment</h3>
            </div>
            <button id="download-receipt-btn" class="secondary-btn" type="button">Download receipt</button>
          </div>
          <p id="receipt-status-note" class="muted top-space"></p>
          <div class="receipt-grid">
            <div class="receipt-block"><span>Applicant</span><strong id="receipt-name"></strong></div>
            <div class="receipt-block"><span>Application ID</span><strong id="receipt-id"></strong></div>
            <div class="receipt-block"><span>Passport Office</span><strong id="receipt-office"></strong></div>
            <div class="receipt-block"><span>Appointment</span><strong id="receipt-slot"></strong></div>
            <div class="receipt-block"><span>Fee</span><strong id="receipt-fee"></strong></div>
            <div class="receipt-block"><span>Issued at</span><strong id="receipt-issued"></strong></div>
          </div>
          <p class="muted">The applicant can download this receipt, revisit it from the dashboard, or share the application ID when needed.</p>
          <div class="service-strip top-space">
            <div><span>Application ID</span><strong>Shareable</strong></div>
            <div><span>Receipt</span><strong>Downloadable</strong></div>
            <div><span>Visit status</span><strong>Ready for appointment</strong></div>
          </div>
        </article>
      </section>
    </template>

    <template id="architecture-template">
      <section class="grid-two">
        <article class="card">
          <p class="eyebrow">Design Decisions</p>
          <h3>Why this flow is better</h3>
          <div class="stack">
            <div class="card inset"><strong>Progressive disclosure</strong><p>Applicants only see one decision or form section at a time, which reduces cognitive overload.</p></div>
            <div class="card inset"><strong>Real form structure</strong><p>Personal, address, background, and emergency contact details mirror real application thinking.</p></div>
            <div class="card inset"><strong>Review before commitment</strong><p>A review step catches mistakes before documents and appointments lock in the submission path.</p></div>
            <div class="card inset"><strong>Confidence after submission</strong><p>Status timeline, export access, and downloadable receipt support the entire journey, not just the form.</p></div>
          </div>
        </article>
        <article class="card">
          <p class="eyebrow">Accessibility and Support</p>
          <h3>Built to feel clearer and calmer</h3>
          <div class="stack">
            <div class="card inset"><strong>Readable visual hierarchy</strong><p>Large headlines, clear grouping, and strong spacing improve scanning for non-tech-savvy users.</p></div>
            <div class="card inset"><strong>Plain-language copy</strong><p>Policy-heavy wording is translated into human, task-focused guidance.</p></div>
            <div class="card inset"><strong>Responsive behavior</strong><p>The layout stacks well on smaller screens so applicants can continue across devices.</p></div>
          </div>
        </article>
      </section>
    </template>

    <script src="./app.js"></script>
  </body>
</html>
